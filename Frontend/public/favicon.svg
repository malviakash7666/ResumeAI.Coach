<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium Cyberpunk Gradient -->
    <linearGradient id="premium-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <linearGradient id="neon-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <filter id="glow-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- High-fidelity squircle background -->
  <rect width="512" height="512" rx="144" fill="url(#premium-bg)" />

  <!-- Outer Ring Glow -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="8" />

  <!-- Shield/Document Shape of Resume coaching -->
  <path d="M160 144 C160 120, 180 100, 204 100 H308 L384 176 V368 C384 392, 364 412, 340 412 H184" fill="#0F172A" opacity="0.9" />
  
  <!-- Folded Corner of Document -->
  <path d="M308 100 V176 H384 Z" fill="url(#neon-glow)" />

  <!-- Modern horizontal lines representing fields -->
  <rect x="192" y="210" width="144" height="12" rx="6" fill="#F8FAFC" />
  <rect x="192" y="246" width="112" height="10" rx="5" fill="#94A3B8" />
  <rect x="192" y="278" width="144" height="10" rx="5" fill="#94A3B8" />
  <rect x="192" y="310" width="80" height="10" rx="5" fill="#06B6D4" />

  <!-- Giant AI Sparkle overlapping the bottom right -->
  <path d="M368 288 L382 334 L428 348 L382 362 L368 408 L354 362 L308 348 L354 334 Z" fill="#F43F5E" filter="url(#glow-effect)" />
  <path d="M368 288 L382 334 L428 348 L382 362 L368 408 L354 362 L308 348 L354 334 Z" fill="#FFFFFF" />

  <!-- Secondary tiny sparkle top left -->
  <path d="M128 112 L132 124 L144 128 L132 132 L128 144 L124 132 L112 128 L124 124 Z" fill="#3B82F6" />
</svg>